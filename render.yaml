# Blueprint Render — Web Service Python (FastAPI / ASGI)
# https://render.com/docs/blueprint-spec
#
# Entrada: backend/server.py → app (uvicorn server:app)
# NÃO usar gunicorn nem WSGI.
#
# Monorepo: build na raiz (requirements.txt inclui backend) + start na pasta backend.
services:
  - type: web
    name: osti-vistoria-api
    runtime: python
    buildCommand: pip install --upgrade pip && pip install --no-cache-dir -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT --proxy-headers --forwarded-allow-ips=*
    healthCheckPath: /health
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: BEHIND_PROXY
        value: "true"
      # No painel: MONGO_URL, CORS_ORIGINS, DB_NAME (opcional)
